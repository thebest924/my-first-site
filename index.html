<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Talk</title>
    <style>
        body {
            background: #0f0f0f;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        #chat-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 15px;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            border-radius: 5px;
            outline: none;
            font-size: 16px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="chat-box">
    <h2 id="bot-text">Привет! Как прошел день?</h2>
    
    <input type="text" id="user-input" placeholder="Напиши что-нибудь...">
    <br>
    <button class="btn" id="main-btn" onclick="talk()">Ответить</button>
    
    <audio id="bg-music">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    let step = 0;

    function talk() {
        const input = document.getElementById('user-input');
        const botText = document.getElementById('bot-text');
        const music = document.getElementById('bg-music');
        const btn = document.getElementById('main-btn');
        
        const val = input.value.trim();

        if (step === 0) {
            botText.innerText = "Ого, серьезно? А кто твой любимый программист теперь? 😉";
            input.value = "";
            input.placeholder = "Напиши имя...";
            step = 1;
        } else if (step === 1) {
            // Твой новый текст в финале
            botText.innerText = "Этот код слишком сложный, картинку вставить не получается, не дорос ещё. Спасибо за внимание!";
            
            input.style.display = "none"; 
            btn.style.display = "none";   
            
            music.play().catch(function(error) {
                console.log("Музыка ждет взаимодействия");
            });
            
            step = 2;
        }
    }
</script>

</body>
</html>
