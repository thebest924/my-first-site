<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проект: Лесные Олени</title>
    <style>
        :root {
            --forest-dark: #1b2e20;
            --deer-brown: #a67c52;
            --soft-cream: #f4ede3;
            --accent-gold: #d4af37;
        }

        body {
            background: linear-gradient(135deg, #2d4a35, #121d15);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--soft-cream);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--deer-brown);
            transition: background-image 0.5s ease;
        }

        h1 {
            font-size: 24px;
            color: var(--accent-gold);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .fact-tag {
            display: inline-block;
            background: var(--deer-brown);
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            opacity: 0.9;
            min-height: 90px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .stat-item span {
            display: block;
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* Кнопка "Дальше" */
        .next-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent-gold);
            border: none;
            border-radius: 10px;
            color: var(--forest-dark);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .next-btn:hover {
            background: var(--soft-cream);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="deer-img" class="image-placeholder" style="background-image: url('https://images.unsplash.com/photo-1484406566174-9da000fda645?q=80&w=1000');"></div>
        <div id="deer-fact" class="fact-tag">Уникальный факт: Смена рогов каждый год</div>
        <h1 id="deer-name">Благородный олень</h1>
        <p id="deer-desc" class="description">
            Символ грации и лесной силы. Эти животные обладают невероятным слухом и способны чувствовать приближение человека за сотни метров.
        </p>
        
        <div class="stats">
            <div class="stat-item">
                <span>Скорость</span>
                <div id="deer-speed">до 50 км/ч</div>
            </div>
            <div class="stat-item">
                <span>Продолжительность</span>
                <div id="deer-life">15–20 лет</div>
            </div>
        </div>

        <button class="next-btn" onclick="nextDeer()">Следующий вид →</button>
    </div>

    <script>
        const deers = [
            {
                name: "Благородный олень",
                fact: "Уникальный факт: Смена рогов каждый год",
                desc: "Символ грации и лесной силы. Эти животные обладают невероятным слухом и способны чувствовать приближение человека за сотни метров.",
                speed: "до 50 км/ч",
                life: "15–20 лет",
                img: "https://images.unsplash.com/photo-1484406566174-9da000fda645?q=80&w=1000"
            },
            {
                name: "Северный олень",
                fact: "Уникальный факт: Рога есть и у самок",
                desc: "Единственный вид оленей, у которого и самцы, и самки носят рога. Их копыта меняются по сезону, чтобы не скользить на льду.",
                speed: "до 80 км/ч",
                life: "12–15 лет",
                img: "image_1.png" /* ССЫЛКА НА СЕВЕРНОГО ОЛЕНЯ ОБНОВЛЕНА */
            },
            {
                name: "Пятнистый олень",
                fact: "Уникальный факт: Пятна для маскировки",
                desc: "Их называют «олени-цветки». Летом они покрыты яркими белыми пятнами, которые помогают прятаться от хищников в лучах солнца.",
                speed: "до 45 км/ч",
                life: "11–14 лет",
                img: "image_2.png" /* ССЫЛКА НА ПЯТНИСТОГО ОЛЕНЯ ОБНОВЛЕНА */
            }
        ];

        let currentIndex = 0;

        function nextDeer() {
            currentIndex = (currentIndex + 1) % deers.length;
            const deer = deers[currentIndex];

            document.getElementById('deer-name').innerText = deer.name;
            document.getElementById('deer-fact').innerText = deer.fact;
            document.getElementById('deer-desc').innerText = deer.desc;
            document.getElementById('deer-speed').innerText = deer.speed;
            document.getElementById('deer-life').innerText = deer.life;
            document.getElementById('deer-img').style.backgroundImage = `url('${deer.img}')`;
        }
    </script>

</body>
</html>
